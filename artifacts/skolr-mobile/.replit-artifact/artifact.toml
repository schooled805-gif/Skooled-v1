kind = "mobile"
previewPath = "/mobile/"
title = "Skolr Mobile"
version = "1.0.0"
id = "artifacts/skolr-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24837

[services.development]
run = "pnpm --filter @workspace/skolr-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skolr-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/skolr-mobile", "run", "serve" ]

[services.env]
PORT = "24837"
BASE_PATH = "/mobile/"
